name: Update verified job data

on:
  schedule:
    # 08:00 and 18:00 Asia/Shanghai.
    - cron: "0 0,10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify and refresh jobs.json
        run: python update_jobs.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json update_log.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update live job data"
            git push
          fi
